<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listar Baterías</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 30px; }
        h2 { color: #0064b4; margin-bottom: 20px; }
        .filtros { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-refrescar { background: #0064b4; color: white; }
        .btn-volver { background: #1e1e1e; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #0064b4; color: white; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:hover { background: #f0f7ff; }
        .total { margin-top: 10px; font-size: 13px; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <h2>🔋 Listado de Baterías</h2>
    <div class="filtros">
        <button class="btn btn-refrescar" onclick="cargarDatos()">🔄 Refrescar</button>
        <button class="btn btn-volver" onclick="location.href='index.html'">← Volver</button>
    </div>
    <div id="tabla"></div>
    <div class="total" id="total"></div>

    <script>
        const axios = require('axios')
        const BASE_URL = 'http://localhost:8080'

        async function cargarDatos() {
            const res = await axios.get(`${BASE_URL}/baterias/`)
            const lista = res.data
            document.getElementById('total').textContent = `Total: ${lista.length} baterías`
            let html = `<table>
                <tr><th>ID</th><th>Marca</th><th>Capacidad (kWh)</th><th>Ciclos de vida</th><th>Voltaje (V)</th></tr>`
            lista.forEach(b => {
                html += `<tr>
                    <td>${b.idBateria}</td>
                    <td>${b.marca}</td>
                    <td>${b.capacidadKwh}</td>
                    <td>${b.ciclosVida}</td>
                    <td>${b.voltaje}</td>
                </tr>`
            })
            html += '</table>'
            document.getElementById('tabla').innerHTML = html
        }

        cargarDatos()
    </script>
</body>
</html>
