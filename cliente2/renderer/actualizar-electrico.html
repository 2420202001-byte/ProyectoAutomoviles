<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actualizar Eléctrico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 30px; }
        h2 { color: #0064b4; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 8px; }
        .btn-buscar { background: #0064b4; color: white; }
        .btn-actualizar { background: #2e8b57; color: white; }
        .btn-volver { background: #1e1e1e; color: white; }
        #panelForm { display: none; margin-top: 20px; }
        .mensaje { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 13px; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>✏️ Actualizar Automóvil Eléctrico</h2>
    <div class="search-bar">
        <input id="txtIdBuscar" type="text" placeholder="Paso 1 - Ingrese el ID">
        <button class="btn btn-buscar" onclick="buscar()">Buscar</button>
        <button class="btn btn-volver" onclick="location.href='index.html'">← Volver</button>
    </div>

    <div id="panelForm">
        <div class="form-group"><label>ID:</label><input id="id" type="text"></div>
        <div class="form-group"><label>Marca:</label><input id="marca" type="text"></div>
        <div class="form-group"><label>Modelo:</label><input id="modelo" type="text"></div>
        <div class="form-group"><label>Año:</label><input id="anio" type="number"></div>
        <div class="form-group"><label>Color:</label><input id="color" type="text"></div>
        <div class="form-group"><label>Precio ($):</label><input id="precio" type="number"></div>
        <div class="form-group"><label>Autonomía (km):</label><input id="autonomiaKm" type="number"></div>
        <div class="form-group"><label>T. Carga (h):</label><input id="tiempoCargaHoras" type="number"></div>
        <div class="form-group">
            <label>Batería:</label>
            <select id="cboBateria"></select>
        </div>
        <button class="btn btn-actualizar" onclick="actualizar()">Actualizar</button>
    </div>
    <div id="mensaje"></div>

    <script>
        const axios = require('axios')
        const BASE_URL = 'http://localhost:8080'
        let idOriginal = ''

        async function cargarBaterias() {
            const select = document.getElementById('cboBateria')
            select.innerHTML = '<option value="">-- Sin batería --</option>'
            try {
                const res = await axios.get(`${BASE_URL}/baterias/`)
                res.data.forEach(b => {
                    const option = document.createElement('option')
                    option.value = b.idBateria
                    option.text = `${b.idBateria} - ${b.marca} (${b.capacidadKwh} kWh)`
                    select.appendChild(option)
                })
            } catch (e) {
                console.log('Error cargando baterías:', e.message)
            }
        }

        async function buscar() {
            const id = document.getElementById('txtIdBuscar').value.trim()
            if (!id) { alert('Ingrese un ID.'); return }
            try {
                const res = await axios.get(`${BASE_URL}/electricos/${id}`)
                const a = res.data
                idOriginal = id
                document.getElementById('id').value = a.id
                document.getElementById('marca').value = a.marca
                document.getElementById('modelo').value = a.modelo
                document.getElementById('anio').value = a.anio
                document.getElementById('color').value = a.color
                document.getElementById('precio').value = a.precio
                document.getElementById('autonomiaKm').value = a.autonomiaKm
                document.getElementById('tiempoCargaHoras').value = a.tiempoCargaHoras

                if (a.bateria) {
                    document.getElementById('cboBateria').value = a.bateria.idBateria
                } else {
                    document.getElementById('cboBateria').selectedIndex = 0
                }

                document.getElementById('panelForm').style.display = 'block'
            } catch (e) {
                document.getElementById('mensaje').innerHTML =
                    `<div class="mensaje error">No se encontró ningún automóvil con ID: ${id}</div>`
            }
        }

        async function actualizar() {
            try {
                const idBateria = document.getElementById('cboBateria').value
                let bateria = null

                if (idBateria) {
                    const resBat = await axios.get(`${BASE_URL}/baterias/${idBateria}`)
                    bateria = resBat.data
                }

                const auto = {
                    id: document.getElementById('id').value.trim(),
                    marca: document.getElementById('marca').value.trim(),
                    modelo: document.getElementById('modelo').value.trim(),
                    anio: parseInt(document.getElementById('anio').value),
                    color: document.getElementById('color').value.trim(),
                    precio: parseFloat(document.getElementById('precio').value),
                    autonomiaKm: parseFloat(document.getElementById('autonomiaKm').value),
                    tiempoCargaHoras: parseFloat(document.getElementById('tiempoCargaHoras').value),
                    bateria: bateria
                }
                await axios.put(`${BASE_URL}/electricos/${idOriginal}`, auto)
                document.getElementById('mensaje').innerHTML =
                    `<div class="mensaje exito">Actualizado correctamente.</div>`
                document.getElementById('panelForm').style.display = 'none'
            } catch (e) {
                document.getElementById('mensaje').innerHTML =
                    `<div class="mensaje error">Error al actualizar.</div>`
            }
        }

        cargarBaterias()
    </script>
</body>
</html>
