<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscar Gasolina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 30px; }
        h2 { color: #963200; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; width: 250px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-buscar { background: #963200; color: white; }
        .btn-volver { background: #1e1e1e; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #963200; color: white; padding: 10px; text-align: left; font-size: 13px; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; }
        .mensaje { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 13px; background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>🔍 Buscar Automóvil a Gasolina</h2>
    <div class="search-bar">
        <input id="txtId" type="text" placeholder="Ingrese el ID">
        <button class="btn btn-buscar" onclick="buscar()">Buscar</button>
        <button class="btn btn-volver" onclick="location.href='index.html'">← Volver</button>
    </div>
    <div id="resultado"></div>

    <script>
        const axios = require('axios')
        const BASE_URL = 'http://localhost:8080'

        async function buscar() {
            const id = document.getElementById('txtId').value.trim()
            if (!id) { alert('Ingrese un ID.'); return }
            try {
                const res = await axios.get(`${BASE_URL}/gasolina/${id}`)
                const a = res.data
                document.getElementById('resultado').innerHTML = `
                    <table>
                        <tr><th>ID</th><th>Marca</th><th>Modelo</th><th>Año</th><th>Color</th><th>Precio</th><th>Consumo</th><th>Tanque</th><th>Cilindraje</th><th>Combustible</th></tr>
                        <tr><td>${a.id}</td><td>${a.marca}</td><td>${a.modelo}</td><td>${a.anio}</td><td>${a.color}</td><td>${a.precio}</td><td>${a.consumoLitrosPor100Km}</td><td>${a.capacidadTanqueLitros}</td><td>${a.cilindraje}</td><td>${a.tipoCombustible}</td></tr>
                    </table>`
            } catch (e) {
                document.getElementById('resultado').innerHTML =
                    `<div class="mensaje">No se encontró ningún automóvil con ID: ${id}</div>`
            }
        }
    </script>
</body>
</html>
