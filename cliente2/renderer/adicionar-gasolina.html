<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Gasolina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 30px; }
        h2 { color: #963200; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; }
        .btn-guardar { background: #963200; color: white; }
        .btn-limpiar { background: #888; color: white; }
        .btn-volver { background: #1e1e1e; color: white; }
        .mensaje { margin-top: 15px; padding: 10px; border-radius: 4px; font-size: 13px; }
        .exito { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .btn-group { margin-top: 15px; }
    </style>
</head>
<body>
    <h2>➕ Adicionar Automóvil a Gasolina</h2>
    <div class="form-group"><label>ID:</label><input id="id" type="text"></div>
    <div class="form-group"><label>Marca:</label><input id="marca" type="text"></div>
    <div class="form-group"><label>Modelo:</label><input id="modelo" type="text"></div>
    <div class="form-group"><label>Año:</label><input id="anio" type="number"></div>
    <div class="form-group"><label>Color:</label><input id="color" type="text"></div>
    <div class="form-group"><label>Precio ($):</label><input id="precio" type="number"></div>
    <div class="form-group"><label>Consumo (L/100km):</label><input id="consumoLitrosPor100Km" type="number"></div>
    <div class="form-group"><label>Tanque (L):</label><input id="capacidadTanqueLitros" type="number"></div>
    <div class="form-group"><label>Cilindraje (cc):</label><input id="cilindraje" type="number"></div>
    <div class="form-group">
        <label>Combustible:</label>
        <select id="tipoCombustible">
            <option>Gasolina corriente</option>
            <option>Gasolina extra</option>
            <option>Premium</option>
        </select>
    </div>
    <div class="btn-group">
        <button class="btn btn-guardar" onclick="guardar()">💾 Guardar</button>
        <button class="btn btn-limpiar" onclick="limpiar()">🧹 Limpiar</button>
        <button class="btn btn-volver" onclick="location.href='index.html'">← Volver</button>
    </div>
    <div id="mensaje"></div>

    <script>
        const axios = require('axios')
        const BASE_URL = 'http://localhost:8080'

        async function guardar() {
            try {
                const auto = {
                    id: document.getElementById('id').value.trim(),
                    marca: document.getElementById('marca').value.trim(),
                    modelo: document.getElementById('modelo').value.trim(),
                    anio: parseInt(document.getElementById('anio').value),
                    color: document.getElementById('color').value.trim(),
                    precio: parseFloat(document.getElementById('precio').value),
                    consumoLitrosPor100Km: parseFloat(document.getElementById('consumoLitrosPor100Km').value),
                    capacidadTanqueLitros: parseFloat(document.getElementById('capacidadTanqueLitros').value),
                    cilindraje: parseInt(document.getElementById('cilindraje').value),
                    tipoCombustible: document.getElementById('tipoCombustible').value,
                    transmision: 'Manual'
                }
                await axios.post(`${BASE_URL}/gasolina/`, auto)
                mostrarMensaje('Automóvil a gasolina guardado exitosamente.', 'exito')
                limpiar()
            } catch (e) {
                mostrarMensaje('Error al guardar: ' + e.message, 'error')
            }
        }

        function limpiar() {
            ['id','marca','modelo','anio','color','precio','consumoLitrosPor100Km',
             'capacidadTanqueLitros','cilindraje'].forEach(id => document.getElementById(id).value = '')
            document.getElementById('tipoCombustible').selectedIndex = 0
            document.getElementById('mensaje').innerHTML = ''
        }

        function mostrarMensaje(texto, tipo) {
            document.getElementById('mensaje').innerHTML =
                `<div class="mensaje ${tipo}">${texto}</div>`
        }
    </script>
</body>
</html>
